<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainHub - Acasă</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        /* Containerul telefonului */
        .phone-container {
            width: 393px;
            height: 852px;
            background-color: #000000;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 8px solid #1f1f1f;
            display: flex;
            flex-direction: column;
            padding: 60px 24px 40px 24px;
        }

        /* Notch modern */
        .dynamic-island {
            width: 110px;
            height: 30px;
            background-color: #000000;
            border-radius: 20px;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .brand-logo {
            font-size: 44px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        /* Meniu */
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
            position: relative;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            opacity: 0.9;
        }

        .relative-icon-group {
            position: relative;
            width: 22px;
            height: 22px;
        }

        .relative-icon-group .icon-sub {
            position: absolute;
            top: 5px;
            left: 10px;
        }

        /* ==================== STRUCTURI DE IFRAME PENTRU MENIURI ==================== */
        #filterFrame {
            position: absolute;
            width: 185px;  
            height: 330px; 
            left: 50px;
            top: 90px;
            border: none;
            z-index: 100;
            background: transparent;
            
            /* Stare inițială ascunsă cu animație */
            opacity: 0;
            transform: scale(0.9) translateY(-10px);
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #temeFrame {
            position: absolute;
            width: 152px;  
            height: 200px; 
            left: 220px;   
            top: 130px;    
            border: none;
            z-index: 101;  
            background: transparent;
            
            /* Stare inițială ascunsă cu animație */
            opacity: 0;
            transform: scale(0.9) translateX(-10px);
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Fundal întunecat invizibil pentru a închide meniurile la click în exterior */
        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 90;
            display: none;
            background: transparent;
        }

        /* Buton Pagini */
        .bottom-bar {
            display: flex;
            justify-content: flex-end;
            margin-top: auto;
            z-index: 5;
        }

        .pages-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: #0091FF;
            border-radius: 24px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 4px 20px rgba(0, 145, 255, 0.4);
            border: 1px solid rgba(0, 145, 255, 0.5);
            transition: all 0.3s ease;
        }

        .pages-btn:hover {
            transform: translateY(-2px);
            background: #1a9cff;
        }

        .home-indicator {
            width: 140px;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }
    </style>
</head>

    <!-- Script de control pentru Iframe-uri (Filtru și Teme) -->
    <script>
        const btnFiltru = document.getElementById('btnFiltru');
        const filterFrame = document.getElementById('filterFrame');
        const temeFrame = document.getElementById('temeFrame');
        const menuOverlay = document.getElementById('menuOverlay');

        // Deschide/închide Filtre
        btnFiltru.addEventListener('click', function(e) {
            e.preventDefault();
            const isActive = filterFrame.style.opacity === "1";
            if (isActive) {
                closePopup();
            } else {
                openPopup();
            }
        });

        // Ascultăm semnalele venite prin postMessage din filtru.html pentru a acționa submeniul Teme
        window.addEventListener('message', function(event) {
            if (event.data === 'toggleTeme') {
                const isTemeActive = temeFrame.style.opacity === "1";
                if (isTemeActive) {
                    closeTeme();
                } else {
                    openTeme();
                }
            }
        });

        // Închidem meniurile dacă utilizatorul apasă pe spațiul liber din jur
        menuOverlay.addEventListener('click', closePopup);

        function openPopup() {
            filterFrame.style.opacity = "1";
            filterFrame.style.transform = "scale(1) translateY(0)";
            filterFrame.style.pointerEvents = "auto";
            menuOverlay.style.display = 'block';
        }

        function closePopup() {
            // Închide filtrele
            filterFrame.style.opacity = "0";
            filterFrame.style.transform = "scale(0.9) translateY(-10px)";
            filterFrame.style.pointerEvents = "none";
            
            // Închide automat și submeniul de teme dacă e deschis
            closeTeme();
            
            menuOverlay.style.display = 'none';
        }

        function openTeme() {
            temeFrame.style.opacity = "1";
            temeFrame.style.transform = "scale(1) translateX(0)";
            temeFrame.style.pointerEvents = "auto";
        }

        function closeTeme() {
            temeFrame.style.opacity = "0";
            temeFrame.style.transform = "scale(0.9) translateX(-10px)";
            temeFrame.style.pointerEvents = "none";
        }
    </script>
